<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GameStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎮 GameStore</h1>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Categorías</a>
            <a href="#">Ofertas</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <section class="catalogo">

        <div class="card">
            <img src="https://via.placeholder.com/250x300" alt="Juego 1">
            <h3>Cyber Adventure</h3>
            <p class="precio">$999 MXN</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x300" alt="Juego 2">
            <h3>Battle Arena X</h3>
            <p class="precio">$799 MXN</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x300" alt="Juego 3">
            <h3>Racing Pro 2026</h3>
            <p class="precio">$1,199 MXN</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x300" alt="Juego 4">
            <h3>Fantasy World</h3>
            <p class="precio">$899 MXN</p>
            <button>Comprar</button>
        </div>

    </section>

    <footer>
        <p>© 2026 GameStore - Todos los derechos reservados</p>
    </footer>

</body>
</html>
